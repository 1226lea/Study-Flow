{% extends 'base.html' %}

{% block title %}Edit Resource - StudyFlow{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h2 class="mb-4"><i class="bi bi-pencil-square text-primary"></i> Edit Resource</h2>
                    
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="title" name="title" value="{{ resource.title }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label">Category</label>
                            <select class="form-select" id="category" name="category">
                                {% for cat in categories %}
                                    <option value="{{ cat.id }}" {% if resource.category.id == cat.id %}selected{% endif %}>
                                        {{ cat.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="4">{{ resource.description }}</textarea>
                        </div>

                        <div class="mb-4">
                            <label for="resource_file" class="form-label">Update File (Optional)</label>
                            <input type="file" class="form-control" id="resource_file" name="resource_file">
                            <div class="form-text text-muted">Leave this blank if you don't want to change the current file.</div>
                        </div>
                        
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'resource_detail' resource.id %}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
